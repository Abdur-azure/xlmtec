# Hyperparameter Sweep — GPT-2 LoRA
#
# Usage:
#   xlmtec sweep examples/configs/sweep_lora_gpt2.yaml --dry-run
#   xlmtec sweep examples/configs/sweep_lora_gpt2.yaml --trials 20
#
# Install optuna first:
#   pip install xlmtec[sweep]

# ── Base PipelineConfig ───────────────────────────────────────────────────
model:
  name: gpt2

dataset:
  source: local_file
  path: ./data/sample.jsonl
  max_samples: 500
  shuffle: true

tokenization:
  max_length: 128
  truncation: true
  padding: max_length

training:
  method: lora
  output_dir: ./sweep_output
  num_epochs: 1
  batch_size: 4
  learning_rate: 2.0e-4
  warmup_ratio: 0.1
  fp16: false
  logging_steps: 10

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05

# ── Sweep Configuration ───────────────────────────────────────────────────
sweep:
  n_trials: 10
  metric: train_loss
  direction: minimize
  output_dir: ./sweep_results
  sampler: tpe              # tpe (default) | random

  params:
    training.learning_rate:
      type: float
      low: 1.0e-5
      high: 1.0e-3
      log: true             # log scale — good for learning rates

    training.batch_size:
      type: categorical
      choices: [2, 4, 8]

    lora.r:
      type: int
      low: 4
      high: 32

    lora.lora_alpha:
      type: categorical
      choices: [8, 16, 32, 64]