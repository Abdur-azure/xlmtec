# Structured Pruning Example Config
#
# Prunes ~30% of attention heads from a fine-tuned GPT-2 model.
# Run with:
#   python examples/generate_sample_data.py   # (only needed for training data)
#   lmtool train --config examples/configs/lora_gpt2.yaml
#   lmtool prune ./outputs/gpt2_lora \
#       --output ./outputs/gpt2_pruned \
#       --sparsity 0.3 \
#       --method heads
#
# Or load directly via Python:
#   from lmtool.core.types import PruningConfig
#   from lmtool.trainers import StructuredPruner
#   from pathlib import Path
#
#   config = PruningConfig(
#       output_dir=Path("./outputs/gpt2_pruned"),
#       sparsity=0.3,
#       method="heads",
#       min_heads_per_layer=1,
#   )

model_path: "./outputs/gpt2_lora"

pruning:
  output_dir: "./outputs/gpt2_pruned"
  sparsity: 0.3
  method: "heads"           # "heads" | "ffn"
  importance_metric: "magnitude"
  min_heads_per_layer: 1

# ── Sparsity guidance ──────────────────────────────────────────────────────
#
#  sparsity  |  effect
#  ----------+--------------------------------------------------------------
#  0.1       |  Light pruning — minimal accuracy impact, small size reduction
#  0.3       |  Moderate pruning — good balance (recommended starting point)
#  0.5       |  Aggressive — noticeable accuracy drop, significant speedup
#  0.7+      |  Extreme — only for heavily over-parameterised models
#
# After pruning, evaluate with:
#   lmtool benchmark gpt2 ./outputs/gpt2_pruned \
#       --dataset ./data/sample.jsonl \
#       --metrics rougeL,bleu